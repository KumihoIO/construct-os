version: "3.8"
services:
  construct:
    image: ghcr.io/KumihoIO/Construct:2026.4.21
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - CONSTRUCT_ALLOW_PUBLIC_BIND=true
      - CONSTRUCT_GATEWAY_PORT=42617
    volumes:
      - construct-data:/construct-data
    expose:
      - 42617
volumes:
  construct-data: {}
